<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title}</title>
<style>
/* Viewer shell styles (dark backdrop, centering for the deck) */
* {{ margin: 0; padding: 0; box-sizing: border-box; }}
body {{
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 20px;
}}
@media (max-width: 800px) {{
  body {{ padding: 0; }}
}}
</style>
{css_block}
</head>
<body>
<div class="deck">
{deck_content}
</div>
{js_block}
</body>
</html>
