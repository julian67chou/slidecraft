# Pitch Dark — 創投簡報主題
# 深色底 + 螢光 accent，現代高對比

version: 1
theme: pitch-dark
description: "Dark background with neon accent — modern VC pitch deck, high-impact"

slide:
  wIn: 13.333
  hIn: 7.5

colors:
  bg: '#0D0D0D'
  surface: '#1A1A1A'
  text:
    p: '#FFFFFF'
    s: '#888888'
  accent: '#6C5CE7'
  accent2: '#00D2D3'
  border: '#2A2A2A'

typography:
  family:
    web: "'Inter', 'Noto Sans TC', system-ui, sans-serif"
    pptx: "Inter"
  weights:
    regular: 400
    medium: 500
    semibold: 600
    bold: 700
  h1:
    pt: 52
    px: 52
    lh: 1.05
    ls: -0.03
    weight: bold
  h2:
    pt: 32
    px: 32
    lh: 1.1
    ls: -0.02
    weight: semibold
  h3:
    pt: 24
    px: 24
    lh: 1.2
    ls: 0
    weight: medium
  body:
    pt: 18
    px: 18
    lh: 1.5
    ls: 0
    weight: regular
  caption:
    pt: 13
    px: 13
    lh: 1.4
    ls: 0.01
    weight: regular

spacing:
  xs: { px: 8, in: 0.10 }
  sm: { px: 16, in: 0.22 }
  md: { px: 24, in: 0.33 }
  lg: { px: 32, in: 0.45 }
  xl: { px: 48, in: 0.66 }

radii:
  card: 8
  button: 6
  image: 8

shadows:
  card:
    x: 0
    y: 4
    blur: 12
    spread: 0
    color: '#00000040'

layouts:
  cover:
    titleY: 0.28
    subtitleY: 0.40
    padX: 1.0
  card-list:
    columns: 3
    gap: { px: 20, in: 0.28 }
    pad: 0.4
  image-text:
    imageRatio: 0.55
    textRatio: 0.45
    gap: { px: 28, in: 0.39 }
  grid:
    columns: 2
    rows: 2
    gap: { px: 20, in: 0.28 }
  transition:
    titleY: 0.5
  content:
    titleY: 0.10
    padX: 0.8
  two-column:
    gap: { px: 24, in: 0.33 }
    ratio: [0.5, 0.5]
  stat-card:
    columns: 3
    gap: { px: 20, in: 0.28 }
  timeline:
    itemSpacing: { px: 28, in: 0.39 }
