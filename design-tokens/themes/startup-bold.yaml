# Startup Bold — 新創/VC主題
version: 1
theme: startup-bold
description: "Bold gradient backgrounds — startup pitch decks, bold statements"
slide:
  wIn: 13.333
  hIn: 7.5
colors:
  bg: '#0F0F1A'
  surface: '#1A1A2E'
  text: { p: '#FFFFFF', s: '#A0A0C0' }
  accent: '#FF3366'
  accent2: '#FF6B35'
  border: '#2A2A45'
typography:
  family:
    web: "'Inter', 'Noto Sans TC', system-ui, sans-serif"
    pptx: "Inter"
  weights: { regular: 400, medium: 500, semibold: 600, bold: 700 }
  h1: { pt: 56, px: 56, lh: 1.02, ls: -0.03, weight: bold }
  h2: { pt: 32, px: 32, lh: 1.1, ls: -0.02, weight: semibold }
  h3: { pt: 24, px: 24, lh: 1.2, ls: 0, weight: medium }
  body: { pt: 18, px: 18, lh: 1.5, ls: 0, weight: regular }
  caption: { pt: 13, px: 13, lh: 1.4, ls: 0.01, weight: regular }
spacing:
  xs: { px: 8, in: 0.10 }
  sm: { px: 16, in: 0.22 }
  md: { px: 24, in: 0.33 }
  lg: { px: 36, in: 0.50 }
  xl: { px: 48, in: 0.66 }
radii: { card: 8, button: 6, image: 8 }
shadows: { card: { x: 0, y: 4, blur: 15, spread: 0, color: '#00000040' } }
layouts:
  cover: { titleY: 0.28, subtitleY: 0.40, padX: 1.0 }
  card-list: { columns: 3, gap: { px: 18, in: 0.25 }, pad: 0.4 }
  image-text: { imageRatio: 0.55, textRatio: 0.45, gap: { px: 26, in: 0.36 } }
  grid: { columns: 2, rows: 2, gap: { px: 18, in: 0.25 } }
  transition: { titleY: 0.5 }
  content: { titleY: 0.10, padX: 0.8 }
  two-column: { gap: { px: 22, in: 0.30 }, ratio: [0.5, 0.5] }
  stat-card: { columns: 3, gap: { px: 18, in: 0.25 } }
  timeline: { itemSpacing: { px: 26, in: 0.36 } }
