name: SlideCraft Deploy

on:
  push:
    branches: [main]
    paths:
      - 'deckspec/*.json'
      - 'templates/*.json'
      - 'renderers/**'
      - 'design-tokens/**'
      - 'scripts/*'
      - '.github/workflows/*'
  workflow_dispatch:
    inputs:
      spec:
        description: 'DeckSpec JSON file path (relative to repo root)'
        required: false
        default: ''

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pyyaml jinja2 2>/dev/null || true

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium --with-deps 2>/dev/null || true

      - name: Prepare output directory (runtime assets)
        run: |
          mkdir -p output
          cp renderers/html/slidecraft.css output/ 2>/dev/null || true
          cp renderers/html/slider.js output/ 2>/dev/null || true
          echo "Assets in output/:"
          ls -la output/

      - name: Find DeckSpecs to render
        id: find-specs
        run: |
          if [ -n "${{ github.event.inputs.spec }}" ]; then
            echo "specs=${{ github.event.inputs.spec }}" >> $GITHUB_OUTPUT
          else
            # Find ALL recently changed deck specs (only deckspec/*.json — templates/ are skeletons)
            CHANGED=$(git log --name-only --pretty=format: -10 -- 'deckspec/*.json' | grep '\.json$' | grep -iv '_skeleton\|readme' | sort -u | tr '\n' ' ')
            if [ -n "$CHANGED" ]; then
              echo "specs=$CHANGED" >> $GITHUB_OUTPUT
            else
              # Fallback: render all existing specs from deckspec/ only
              ALL=$(ls deckspec/*.json 2>/dev/null | grep -iv '_skeleton\|readme' | tr '\n' ' ')
              if [ -n "$ALL" ]; then
                echo "specs=$ALL" >> $GITHUB_OUTPUT
              else
                echo "specs=" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Render all DeckSpecs
        if: steps.find-specs.outputs.specs != ''
        shell: bash
        run: |
          for SPEC in ${{ steps.find-specs.outputs.specs }}; do
            echo "=== Rendering: $SPEC ==="
            python cli/main.py --spec "$SPEC" --external || echo "⚠️  Render failed for $SPEC, continuing..."
          done
          echo "=== All renders complete ==="
          echo "Output files:"
          ls -la output/

      - name: Verify all decks
        if: steps.find-specs.outputs.specs != ''
        run: |
          FAILED=0
          for html in output/*.html; do
            echo "=== Verifying: $html ==="
            python scripts/verify-deck.py --html "$html" --ci --report "verify-output/$(basename $html .html).json" || {
              echo "⚠️  Verification WARNING for $html (continuing anyway)"
            }
            echo "✅ Verified: $html"
          done
          exit $FAILED

      - name: Generate landing page
        if: steps.find-specs.outputs.specs != ''
        run: |
          python scripts/build-landing.py output
          echo "Landing page generated:"
          head -5 output/index.html

      - name: Deploy to GitHub Pages (assets + rendered decks)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true

