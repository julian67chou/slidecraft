name: SlideCraft Deploy

on:
  push:
    branches: [main]
    paths:
      - 'deckspec/*.json'
      - 'templates/*.json'
      - 'renderers/**'
      - 'design-tokens/**'
      - 'scripts/*'
      - '.github/workflows/*'
  workflow_dispatch:
    inputs:
      spec:
        description: 'DeckSpec JSON file path (relative to repo root)'
        required: false
        default: ''

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pyyaml jinja2 2>/dev/null || true

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium --with-deps 2>/dev/null || true

      - name: Find DeckSpec to render
        id: find-spec
        run: |
          if [ -n "${{ github.event.inputs.spec }}" ]; then
            echo "spec=${{ github.event.inputs.spec }}" >> $GITHUB_OUTPUT
          else
            # Find the most recently changed .json in deckspec/ or templates/ (by git history, not filesystem mtime)
            LATEST=$(git log --name-only --pretty=format: -10 -- 'deckspec/*.json' 'templates/*.json' | grep '\.json$' | grep -v '_skeleton\|README' | head -1)
            if [ -n "$LATEST" ]; then
              echo "spec=$LATEST" >> $GITHUB_OUTPUT
            else
              echo "spec=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Prepare output directory (assets)
        run: |
          mkdir -p output
          cp renderers/html/slidecraft.css output/ 2>/dev/null || true
          cp renderers/html/slider.js output/ 2>/dev/null || true
          echo "Assets in output/:"
          ls -la output/

      - name: Render DeckSpec
        if: steps.find-spec.outputs.spec != ''
        run: |
          SPEC="${{ steps.find-spec.outputs.spec }}"
          echo "Rendering: $SPEC"
          python cli/main.py --spec "$SPEC" --external
          echo "Output files:"
          ls -la output/

      - name: Verify Deck Quality
        if: steps.find-spec.outputs.spec != ''
        run: |
          for html in output/*.html; do
            echo "=== Verifying: $html ==="
            python scripts/verify-deck.py --html "$html" --ci --report "verify-output/$(basename $html .html).json"
            RC=$?
            if [ $RC -ne 0 ]; then
              echo "❌ Verification FAILED for $html"
              exit $RC
            fi
            echo "✅ Verification PASSED for $html"
          done

      - name: Deploy to GitHub Pages (assets + optional rendered deck)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          destination_dir: ./decks
          keep_files: true
